name: CI

on:
  push:
    branches: [main, draft]
  pull_request:
    branches: [main, draft]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Verify schema coverage
        run: |
          if [ "${{ github.ref_name }}" = "draft" ] || [ "${{ github.base_ref }}" = "draft" ]; then
            npm run verify:schemas -- --branch main
          else
            npm run verify:schemas
          fi

      - name: Build
        run: npm run build

      - name: Validate exports
        run: npm run check:exports

      - name: Validate package
        run: npm run check:publish
